<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MOMENT – Lab Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

h1{
  margin-top:10px;
}

button{
  width:90%;
  padding:14px;
  margin:6px 0;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

button:active{
  background:#444;
}

.activeSaliva{
  background:#0055aa !important;
}

#timer{
  font-size:22px;
  margin:15px 0;
}

#salivaTimer{
  font-size:20px;
  margin-bottom:10px;
}

.section{
  margin-top:20px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>MOMENT</h1>

<div id="startScreen">
  <p>⚠️ Bitte Flugmodus aktivieren</p>
  <button onclick="startExperiment()">Testung starten</button>
</div>

<div id="mainScreen" class="hidden">

  <div id="timer">00:00</div>

  <div class="section">
    <h2>Exklusive Blöcke</h2>
    <div id="salivaTimer">Speichel-Timer: 00:00</div>

    <button onclick="exclusiveEvent('T0 – Speichel', true, this)">T0 – Speichel</button>
    <button onclick="exclusiveEvent('T2 – Speichel', true, this)">T2 – Speichel</button>
    <button onclick="exclusiveEvent('T3 – Speichel', true, this)">T3 – Speichel</button>
    <button onclick="exclusiveEvent('T4 – Speichel', true, this)">T4 – Speichel</button>
  </div>

</div>

<script>
let experimentStart;
let salivaStart = null;
let salivaAlertTriggered = false;
let wakeLock = null;
let experimentEnd = false;

const SALIVA_INTERVAL = 20 * 60 * 1000;

function format(ms){
  let sec = Math.floor(ms/1000);
  let min = Math.floor(sec/60);
  sec = sec % 60;
  return String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

function formatShort(ms){
  let sec = Math.floor(ms/1000);
  let min = Math.floor(sec/60);
  sec = sec % 60;
  return String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

async function requestWakeLock(){
  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(err){
    console.log("Wake Lock nicht verfügbar");
  }
}

function startExperiment(){
  document.documentElement.requestFullscreen().catch(()=>{});
  requestWakeLock();

  experimentStart = Date.now();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("mainScreen").classList.remove("hidden");
}

function exclusiveEvent(label, isSaliva, btn){

  if(isSaliva){
    salivaStart = Date.now();
    salivaAlertTriggered = false;

    document.querySelectorAll(".activeSaliva")
      .forEach(b=>b.classList.remove("activeSaliva"));

    btn.classList.add("activeSaliva");
  }
}

function triggerSalivaAlert(){
  if(navigator.vibrate){
    navigator.vibrate([500,200,500]);
  }
  alert("20 Minuten erreicht – nächste Speichelprobe!");
}

setInterval(()=>{

  if(experimentStart && !experimentEnd){
    let diff = Date.now() - experimentStart;
    document.getElementById("timer").innerText = format(diff);
  }

  if (salivaStart && !experimentEnd) {
    let diff = Date.now() - salivaStart;
    document.getElementById("salivaTimer").innerText =
      "Speichel-Timer: " + formatShort(diff);

    if (diff >= SALIVA_INTERVAL && !salivaAlertTriggered) {
      salivaAlertTriggered = true;
      triggerSalivaAlert();
    }
  } else {
    document.getElementById("salivaTimer").innerText =
      "Speichel-Timer: 00:00";
  }

},1000);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
